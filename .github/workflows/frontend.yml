name: frontend-ci-cd

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

env:
  SERVICE_NAME: frontend
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/urbancare-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop ${{ env.SERVICE_NAME }} || true
            docker rm ${{ env.SERVICE_NAME }} || true
            docker run -d --name ${{ env.SERVICE_NAME }} \
              --restart always \
              --network urbancare \
              -p 80:80 \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            PREVIOUS=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^${{ env.IMAGE_NAME }}:" | grep -v "${{ github.sha }}" | head -n 1)
            if [ -n "$PREVIOUS" ]; then
              docker stop ${{ env.SERVICE_NAME }} || true
              docker rm ${{ env.SERVICE_NAME }} || true
              docker run -d --name ${{ env.SERVICE_NAME }} \
                --restart always \
                --network urbancare \
                -p 80:80 \
                "$PREVIOUS"
            fi
