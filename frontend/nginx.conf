server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ──────────────────────────────────────────────────────
    # The trailing slash on proxy_pass strips the location prefix before forwarding.
    # e.g. /api/common/auth/login → http://common-service:5001/auth/login

    location /api/common/ {
        proxy_pass         http://common-service:5001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/appointments/ {
        proxy_pass         http://appointment-service:5002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/doctors/ {
        proxy_pass         http://doctor-service:5003/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/patients/ {
        proxy_pass         http://patient-service:5004/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA fallback ─────────────────────────────────────────────────────
    # Any path that doesn't match a real file → serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
