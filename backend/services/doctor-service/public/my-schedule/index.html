<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Schedule — UrbanCare Doctor</title>
    <link rel="stylesheet" href="/my-schedule/schedule.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>My Schedule</h1>
        <p>Set recurring weekly availability in 2-hour blocks (6:00 AM–10:00 PM). Week runs Monday–Sunday and rolls forward after Sunday night (next Monday).</p>
      </header>

      <div id="login-panel" class="login-panel">
        <h2>Doctor sign in</h2>
        <form id="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required />
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
          <button type="submit">Sign in</button>
          <div id="form-err" class="err"></div>
        </form>
      </div>

      <div id="calendar-shell" class="calendar-shell hidden">
        <div class="week-bar">
          <div id="week-range" class="week-range"></div>
          <div class="hint">Click a slot to mark available (dark green). Click again to remove (confirm).</div>
        </div>
        <div class="grid-wrap">
          <div id="cal-grid" class="cal-grid"></div>
        </div>
        <button type="button" id="btn-logout" class="logout">Sign out</button>
      </div>
    </div>
    <script src="/my-schedule/schedule.js"></script>
  </body>
</html>
